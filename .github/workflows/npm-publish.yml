name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, such as v0.1.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @persistlyapp/phaser
    runs-on: ubuntu-latest
    if: github.repository == 'Persistly/persistly-sdk-phaser'
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"
          if [[ "${{ steps.release.outputs.tag }}" != "$expected_tag" ]]; then
            echo "Release tag ${{ steps.release.outputs.tag }} does not match package version $package_version." >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Package consumer smoke
        run: node scripts/package-consumer-smoke.mjs

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish
        run: npm publish --access public
